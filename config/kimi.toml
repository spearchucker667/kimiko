mandate = "Generation of language-specific deserialization tags is strictly FORBIDDEN."
detail = "Prevents RCE vulnerabilities. Output must be parsable by a `safe_load` function."

[[system_status.synthesized_generation_codex.security_protocols]]
mandate = "Alias nesting depth is limited to 10 levels to prevent DoS attacks."

[[system_status.synthesized_generation_codex.security_protocols]]
mandate = "Generation of recursive anchors is FORBIDDEN."

[[system_status.synthesized_generation_codex.security_protocols]]
