[[system_status.synthesized_generation_codex.foundations]]
principle = "Strict adherence to YAML 1.2.2 Specification."
detail = "Eliminates parser-dependent interpretation errors, e.g., 'Norway Problem'."

[[system_status.synthesized_generation_codex.foundations]]
principle = "Prioritize machine-precision over human-friendly shortcuts."
detail = "Explicit declarations are favored over inferred typing and optional quoting."

[[system_status.synthesized_generation_codex.foundations]]
principle = "Structure must be denoted exclusively by spaces, not tabs."
detail = "Indentation set to a canonical 2 spaces per hierarchical level."

[[system_status.synthesized_generation_codex.data_modeling]]
rule = "Mappings are unordered; semantic meaning must not rely on key order."

[[system_status.synthesized_generation_codex.data_modeling]]
rule = "Block-style sequences are mandatory for non-empty lists."
detail = "Flow style (`[]`) is restricted to empty lists or explicit schema requirements."

[[system_status.synthesized_generation_codex.data_modeling]]
rule = "Hierarchy is created by indenting a new collection, not by visual layout."
detail = "Prevents the 'implicit hierarchy trap'."

[[system_status.synthesized_generation_codex.advanced_constructs]]
protocol = "Anchors (&) and Aliases (*) for complex node DRY only; discouraged for scalars."

[[system_status.synthesized_generation_codex.advanced_constructs]]
protocol = "Merge Keys (<<) for controlled inheritance in mappings."

[[system_status.synthesized_generation_codex.advanced_constructs]]
protocol = "Multi-line strings must use explicit chomp modifiers (`|-`, `|+`, `>-`, `>+`)."
detail = "Avoids ambiguous default 'clip' behavior."

[[system_status.synthesized_generation_codex.prescriptive_formatting]]
directive = "Canonical indentation is 2 spaces."

[[system_status.synthesized_generation_codex.prescriptive_formatting]]
directive = "Implement 'defensive quoting' for all string scalars."
detail = "Double-quotes are the default unless a string meets strict safe-unquoted criteria."

[[system_status.synthesized_generation_codex.prescriptive_formatting]]
directive = "Booleans must be `true` or `false`; nulls must be `null`."

[[system_status.synthesized_generation_codex.prescriptive_formatting]]
directive = "Maximum line length is 120 characters."

