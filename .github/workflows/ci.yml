name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./validator
        run: |
          python3 -m pip install --upgrade pip
          pip install jsonschema pyyaml pytest ruff

      - name: Run tests
        working-directory: ./validator
        run: pytest -v

      - name: Run linter
        working-directory: ./validator
        run: ruff check . || true

      - name: Install files
        run: make install

      - name: Validate install
        run: make verify

      - name: Check sync
        run: make sync

      - name: Run compliance check
        working-directory: ./validator
        run: |
          python3 validate_kimi.py compliance ~/.kimi || true

  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./validator
        run: |
          python3 -m pip install --upgrade pip
          pip install jsonschema pyyaml pytest ruff

      - name: Run tests
        working-directory: ./validator
        run: pytest -v

      - name: Install files
        run: make install

      - name: Validate install
        run: make verify

      - name: Check sync
        run: make sync

      - name: Run validator checks
        run: make check

  test-windows-pwsh:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        working-directory: ./validator
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml pytest ruff

      - name: Run tests
        shell: pwsh
        working-directory: ./validator
        run: pytest -v

      - name: Install files via Makefile
        shell: pwsh
        run: make install-windows

      - name: Validate PowerShell scripts syntax
        shell: pwsh
        run: |
          Get-ChildItem "$env:USERPROFILE\.kimi\*.ps1" | ForEach-Object {
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $_.FullName -Raw), [ref]$null)
            Write-Host "Syntax OK: $($_.Name)"
          }

      - name: Verify files present
        shell: pwsh
        run: |
          $files = @("config.toml", "kimi.toml", "mandate-agent.yaml", "mandate-kimiko-agent.yaml", "activate-mandate.ps1", "kimi-wrapper.ps1", "kimi-shell-integration.ps1", "launch-with-mandate.ps1", "kimi.json")
          foreach ($f in $files) {
            $path = Join-Path $env:USERPROFILE ".kimi" $f
            if (Test-Path $path) { Write-Host "OK: $f" }
            else { Write-Host "MISSING: $f"; exit 1 }
          }

      - name: Verify JSON valid
        shell: pwsh
        run: |
          $json = Get-Content "$env:USERPROFILE\.kimi\kimi.json" -Raw
          $null = $json | ConvertFrom-Json
          Write-Host "kimi.json: valid JSON"

      - name: Verify kimiko references
        shell: pwsh
        run: |
          $config = Get-Content "$env:USERPROFILE\.kimi\config.toml" -Raw
          if ($config -notmatch 'mandate_code\s*=\s*"kimiko"') { Write-Host "config.toml missing mandate_code 'kimiko'"; exit 1 }
          $mandate = Get-Content "$env:USERPROFILE\.kimi\mandate-kimiko-agent.yaml" -Raw
          if ($mandate -notmatch 'mandate_code:\s*"kimiko"') { Write-Host "mandate-kimiko-agent.yaml missing mandate_code 'kimiko'"; exit 1 }
          Write-Host "kimiko references verified"

      - name: Check sync (PowerShell)
        shell: pwsh
        run: |
          # Helper: normalize CRLF -> LF and trim
          function Normalize($text) {
            return ($text -replace "`r`n", "`n").Trim()
          }

          # config.toml vs kimi.toml (drop leading comment lines from kimi.toml)
          $configPath = "config/config.toml"
          $kimiPath   = "config/kimi.toml"

          $config = Normalize (Get-Content $configPath -Raw)
          $kimiLines = Get-Content $kimiPath
          $start = 0
          for ($i=0; $i -lt $kimiLines.Count; $i++) {
            if ($kimiLines[$i] -notmatch '^\s*#') { $start = $i; break }
          }
          $kimiBody = Normalize ($kimiLines[$start..($kimiLines.Count-1)] -join "`n")

          if ($config -ne $kimiBody) {
            Write-Error "config.toml and kimi.toml differ (after stripping kimi.toml comment header)"
            exit 1
          }

          # mandate files must match
          $m1 = Normalize (Get-Content "config/mandate-agent.yaml" -Raw)
          $m2 = Normalize (Get-Content "config/mandate-kimiko-agent.yaml" -Raw)
          if ($m1 -ne $m2) {
            Write-Error "mandate-agent.yaml and mandate-kimiko-agent.yaml differ"
            exit 1
          }

          Write-Host "All sync checks passed."

  test-windows-gitbash:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./validator
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          pip install jsonschema pyyaml pytest ruff

      - name: Run tests
        working-directory: ./validator
        shell: bash
        run: pytest -v

      - name: Install files (Git Bash)
        shell: bash
        run: make install

      - name: Validate install
        shell: bash
        run: make verify

      - name: Check sync
        shell: bash
        run: make sync

      - name: Run validator checks
        shell: bash
        run: make check
